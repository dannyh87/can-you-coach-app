<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#172554" />
    <title>You&rsquo;re offline | Can You Coach</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, #dbeafe 0, #f8fafc 42%, #f8fafc 100%);
      }

      main {
        width: min(100%, 460px);
        border: 1px solid #dbeafe;
        border-radius: 24px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #1d4ed8;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .mark {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        background: #172554;
        color: #ffffff;
        display: inline-grid;
        place-items: center;
        font-weight: 900;
      }

      h1 {
        margin: 20px 0 0;
        font-size: clamp(32px, 8vw, 48px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      p {
        margin: 14px 0 0;
        color: #475569;
        font-size: 16px;
        line-height: 1.6;
      }

      .note {
        margin-top: 20px;
        border-radius: 16px;
        background: #eff6ff;
        padding: 14px;
        color: #1e3a8a;
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand"><span class="mark">CYC</span>Can You Coach</div>
      <h1>You&rsquo;re offline</h1>
      <p>Reconnect to continue using Can You Coach.</p>
      <p class="note">Offline recording is not available yet. Match, fitness and player data need a connection.</p>
    </main>
  </body>
</html>
